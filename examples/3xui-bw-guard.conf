# 3xui-bw-guard example config

IFACE="auto"
INGRESS_IFB="ifb3xui0"

# Set your Xray/3x-ui config path here if you want auto inbound port detection
XRAY_CONFIG_PATH="/usr/local/x-ui/bin/config.json"

# Optional manual ports, comma-separated
# If empty, the script tries to detect from XRAY_CONFIG_PATH
MANAGED_PORTS=""

# Optional ports to skip
EXCLUDE_PORTS=""

# IPs that should never be limited
EXEMPT_IPS="127.0.0.1,::1"

# Per-client limits
LIMIT_DOWN="5mbit"
LIMIT_UP="1mbit"

# Root bandwidth values
UPLINK_RATE="100mbit"
INGRESS_RATE="100mbit"

# 0 disables per-IP connection limiting
MAX_CONN_PER_IP="8"

# Smart burst settings
SMART_BURST="yes"
BURST_INTERVAL_MS="120"

# Runtime behavior
SCAN_INTERVAL="5"
FLOW_GRACE_SECONDS="30"
LOG_LEVEL="info"
